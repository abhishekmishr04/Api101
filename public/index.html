<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API101 Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #020617, #0f172a);
      color: #f9fafb;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    .card {
      background: rgba(17, 24, 39, 0.95);
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 32px;
      max-width: 560px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.25);
      text-align: center;
    }
    a {
      display: inline-block;
      margin-top: 16px;
      padding: 10px 16px;
      background: #38bdf8;
      color: #020617;
      text-decoration: none;
      border-radius: 999px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>API101 Dashboard</h1>
    <p>This site is now published and includes a dashboard page for the imported data.</p>
    <a href="/dashboard.html">Open dashboard</a>
  </div>
</body>
</html>
